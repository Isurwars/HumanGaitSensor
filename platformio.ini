; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; Explicit port routing
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Force slow, highly stable connection parameters
upload_speed = 115200

; CRITICAL: Stop esptool from uploading a RAM stub that resets the native USB device
upload_flags = 
    --no-stub

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

# Automatically update the compilation database on every build/pre-build
extra_scripts = post:generate_compiledb.py